# Weekly dependency updates via automated PRs.
# CI runs on each Dependabot PR so regressions are caught automatically.
# Next.js major versions are excluded — those need careful manual migration.

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Europe/Berlin"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
    commit-message:
      prefix: "chore"